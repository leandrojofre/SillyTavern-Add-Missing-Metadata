<div class="example-extension-settings add-miss-meta-window">
	<div class="inline-drawer">
		<div class="inline-drawer-toggle inline-drawer-header">
			<b>Add Missing Metadata</b>
			<div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
		</div>

		<div id="add-miss-meta-settings-window" class="inline-drawer-content p-1">
			<div class="flex-container flex-column separator-bottom">
				<b>Settings</b>

				<label class="flex-container">
					<input id="add-miss-meta-activate-extension" add-miss-meta-setting="enabled" type="checkbox"/>
					<label for="add-miss-meta-activate-extension">Enable/Disable the extension</label>
				</label>
			</div>

			<div class="flex-container flex-column separator-bottom">
				<b>Features</b>

				<div class="flex-container">
					<button id="add-miss-meta-token-count" class="menu_button" type="button">Add Token Count</button>
					<span>Add missing token count to all messages</span>
				</div>
			</div>

			<div class="flex-container flex-column mb-1">
				<b>Debug settings</b>

				<div class="flex-container">
					<button id="add-miss-meta-check-configuration" class="menu_button" type="button">Check Configuration</button>
					<span>Print the configuration values ​​through the console</span>
				</div>

				<label class="flex-container">
					<input id="add-miss-meta-activate-debug" add-miss-meta-setting="debug" type="checkbox"/>
					<label for="add-miss-meta-activate-debug">Enable/Disable the debug console logs</label>
				</label>
			</div>
		</div>
	</div>
</div>
